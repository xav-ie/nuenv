name: Nix + binary cache
description: >
  Install Nix, wire our public binary cache as a substituter (pulls on every
  event, no token needed), and push newly-built paths back — but only on trusted
  pushes to main or a release tag, so the token never reaches the PR path.

inputs:
  push-token:
    description: >
      Attic push token (pass secrets.ATTIC_TOKEN from the caller). Only used by
      the push step, which is itself gated to trusted refs — so it's safely
      empty/unused on PRs.
    default: ""

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      with:
        # Public cache → pull with no token, on every event (incl. fork PRs).
        extra-conf: |
          extra-substituters = https://cache.lalala.casa/nuenv
          extra-trusted-public-keys = nuenv:MyjRq6sJLzmfLzWbn/JN5BI9arB9L0SfgpydF56pGug=

    # Push only on trusted pushes to main or a release tag — never on PRs or
    # manual dispatch — so the token is absent from every untrusted path.
    - if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
      uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
      with:
        endpoint: https://cache.lalala.casa
        cache: nuenv
        token: ${{ inputs.push-token }}
        skip-use: true # substituter already configured via extra-conf above
