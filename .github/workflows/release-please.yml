name: "Release Please"

on:
  push:
    branches:
      - "main"

permissions:
  contents: "write"
  pull-requests: "write"

jobs:
  release-please:
    runs-on: "ubuntu-latest"
    outputs:
      release_created: "${{ steps.release.outputs.release_created }}"
      tag_name: "${{ steps.release.outputs.tag_name }}"
    steps:
      - uses: "googleapis/release-please-action@v4"
        id: "release"
        with:
          config-file: "release-please-config.json"
          manifest-file: ".release-please-manifest.json"

  # release-please creates the tag/release with GITHUB_TOKEN. GitHub, by design,
  # does NOT trigger further workflows (like publish-tagged-flakehub.yml) from a
  # GITHUB_TOKEN-pushed tag, so we publish to FlakeHub here instead — but only
  # when release-please actually cut a release.
  publish-flakehub:
    needs: "release-please"
    if: "${{ needs.release-please.outputs.release_created }}"
    runs-on: "ubuntu-22.04"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v4"
        with:
          ref: "${{ needs.release-please.outputs.tag_name }}"
      - uses: "DeterminateSystems/nix-installer-action@main"
      - uses: "DeterminateSystems/flakehub-push@main"
        with:
          visibility: "public"
          tag: "${{ needs.release-please.outputs.tag_name }}"
